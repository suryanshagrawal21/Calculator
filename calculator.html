<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="calculator">
        <div id="display" class="display">
            <div class="display-expression" id="expression"></div>
            <div class="display-current" id="current">0</div>
        </div>
        <div class="button-grid">
            <button class="btn-clear" onclick="clearAll()">AC</button>
            <button class="btn-operator" onclick="toggleSign()">+/-</button>
            <button class="btn-operator" onclick="percentage()">%</button>
            <button class="btn-operator accent" onclick="setOperator('/')">&divide;</button>

            <button class="btn-number" onclick="appendNumber('7')">7</button>
            <button class="btn-number" onclick="appendNumber('8')">8</button>
            <button class="btn-number" onclick="appendNumber('9')">9</button>
            <button class="btn-operator accent" onclick="setOperator('*')">&times;</button>

            <button class="btn-number" onclick="appendNumber('4')">4</button>
            <button class="btn-number" onclick="appendNumber('5')">5</button>
            <button class="btn-number" onclick="appendNumber('6')">6</button>
            <button class="btn-operator accent" onclick="setOperator('-')">&minus;</button>

            <button class="btn-number" onclick="appendNumber('1')">1</button>
            <button class="btn-number" onclick="appendNumber('2')">2</button>
            <button class="btn-number" onclick="appendNumber('3')">3</button>
            <button class="btn-operator accent" onclick="setOperator('+')">+</button>

            <button class="btn-number wide" onclick="appendNumber('0')">0</button>
            <button class="btn-number" onclick="appendDecimal()">.</button>
            <button class="btn-equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
